name: taskboard
region: nyc

# Replace YOUR_GITHUB_USERNAME/taskboard with your actual GitHub repo
# before deploying: doctl apps create --spec .do/app.yaml

databases:
  - name: db
    engine: PG
    version: "16"
    production: true

services:
  - name: api
    github:
      repo: YOUR_GITHUB_USERNAME/taskboard
      branch: main
      deploy_on_push: true
    source_dir: backend/Taskboard.Api
    environment_slug: dotnet
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    build_command: dotnet publish -c Release -o out
    run_command: dotnet out/Taskboard.Api.dll
    routes:
      - path: /api
      - path: /uploads
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
        scope: RUN_TIME
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

static_sites:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/taskboard
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm ci && npm run build
    output_dir: dist
    catchall_document: index.html
    routes:
      - path: /
